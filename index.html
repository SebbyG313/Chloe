<title>Alan's Picture Palace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Limelight&display=swap" rel="stylesheet">
<style>
  :root{
    --velvet:#6e0f1c;--velvet-dark:#3d0810;--backdrop:#160407;
    --gold:#e7c56a;--gold-deep:#b58a32;--cream:#f6ecd2;--bulb:#ffe9a8;
    --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  html,body{height:100%;width:100%;overflow:hidden;position:fixed;overscroll-behavior:none;touch-action:manipulation;}
  body{font-family:"Cinzel",Georgia,serif;
    background:radial-gradient(120% 80% at 50% -10%,#2a070d 0%,var(--backdrop) 60%);
    color:var(--cream);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
  .theatre{position:relative;display:flex;flex-direction:column;width:100%;height:100%;
    max-width:480px;max-height:100dvh;background:var(--velvet-dark);overflow:hidden;}

  .marquee{position:relative;z-index:3;text-align:center;padding:calc(10px + var(--safe-top)) 16px 10px;
    background:linear-gradient(180deg,#2a070d,#4a0a14);border-bottom:3px solid var(--gold-deep);}
  .bulbs{position:absolute;left:10px;right:10px;display:flex;justify-content:space-between;}
  .bulbs.top{top:calc(5px + var(--safe-top));}.bulbs.bottom{bottom:4px;}
  .bulb{width:6px;height:6px;border-radius:50%;background:var(--bulb);
    box-shadow:0 0 6px 2px rgba(255,224,140,.8);animation:blink 1.4s infinite ease-in-out;}
  .bulb:nth-child(2n){animation-delay:.2s;}.bulb:nth-child(3n){animation-delay:.45s;}.bulb:nth-child(4n){animation-delay:.7s;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  .eyebrow{font-size:10px;letter-spacing:.4em;color:var(--gold);margin:8px 0 2px;padding-left:.4em;}
  .title{font-weight:900;line-height:.9;font-size:clamp(26px,8vw,38px);color:var(--cream);
    text-shadow:0 2px 0 var(--gold-deep),0 0 22px rgba(231,197,106,.35);}
  .presents{font-size:9px;letter-spacing:.3em;color:#d9b9bd;margin-top:6px;padding-left:.3em;}
  .presents.director{color:var(--gold);margin-top:3px;font-size:8.5px;}

  .stage{position:relative;flex:1;min-height:0;overflow:hidden;background:radial-gradient(120% 100% at 50% 0%,#241016 0%,#0c0204 80%);}
  .curtain{position:absolute;top:0;bottom:0;width:26px;z-index:2;pointer-events:none;
    background:repeating-linear-gradient(90deg,#5c0c16 0 8px,#7a1320 8px 15px,#4a0a12 15px 24px);
    box-shadow:0 0 24px rgba(0,0,0,.6) inset;}
  .curtain.left{left:0;}.curtain.right{right:0;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}

  .hud{position:absolute;top:8px;left:42px;right:36px;z-index:4;display:flex;justify-content:space-between;
    align-items:flex-start;font-family:"Limelight","Cinzel",serif;pointer-events:none;}
  .hud .label{font-size:11px;letter-spacing:.12em;color:var(--gold);}
  .hud .big{display:block;font-size:24px;color:var(--cream);line-height:1;}
  .lives{display:flex;gap:5px;margin-top:3px;}
  .life{width:14px;height:14px;border-radius:3px;background:linear-gradient(180deg,#fff 0 50%,#c8202c 50% 100%);box-shadow:0 0 0 1px rgba(0,0,0,.3);}
  .life.gone{opacity:.18;filter:grayscale(1);}
  .right{text-align:right;}

  .exit{position:absolute;top:8px;left:6px;z-index:5;display:none;cursor:pointer;
    width:30px;height:30px;border-radius:50%;border:1px solid rgba(231,197,106,.5);
    background:rgba(20,4,8,.6);color:var(--gold);font-size:15px;line-height:1;font-family:"Cinzel",serif;}
  .exit:active{transform:scale(.92);}
  .exit:focus-visible{outline:2px solid var(--cream);outline-offset:2px;}

  .screen{position:absolute;inset:0;z-index:6;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    text-align:center;padding:16px 26px;overflow-y:auto;-webkit-overflow-scrolling:touch;background:radial-gradient(120% 100% at 50% 35%,rgba(20,4,8,.86),rgba(8,1,3,.96));}
  .screen::before{content:"";margin-top:auto;}
  .screen::after{content:"";margin-bottom:auto;}
  .screen.hidden{display:none;}
  .screen h2{font-family:"Limelight","Cinzel",serif;font-size:clamp(32px,11vw,50px);color:var(--gold);
    line-height:.95;text-shadow:0 0 26px rgba(231,197,106,.4);}
  .screen p{margin-top:12px;font-size:13px;line-height:1.6;color:#e9d8b6;max-width:30ch;}
  .screen p .name{color:var(--gold);font-weight:700;}
  .big-score{font-family:"Limelight",serif;font-size:58px;color:var(--cream);margin:4px 0 0;}

  .portrait{width:84px;height:84px;border-radius:50%;margin-bottom:6px;flex:none;
    background-size:cover;background-position:center;
    border:3px solid var(--gold);box-shadow:0 0 0 4px rgba(110,15,28,.6),0 0 22px rgba(231,197,106,.5);overflow:hidden;}
  .portrait img{width:100%;height:100%;object-fit:cover;display:block;}
  .star{font-size:42px;margin-bottom:4px;filter:drop-shadow(0 0 10px rgba(231,197,106,.5));}

  .btn{margin-top:16px;cursor:pointer;border:none;font-family:"Cinzel",serif;font-weight:700;letter-spacing:.14em;
    font-size:15px;color:#2a070d;padding:15px 30px;border-radius:40px;background:linear-gradient(180deg,#f3d784,var(--gold-deep));
    box-shadow:0 6px 0 #7a5a1c,0 10px 22px rgba(0,0,0,.5);transition:transform .08s ease,box-shadow .08s ease;min-width:200px;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #7a5a1c,0 6px 14px rgba(0,0,0,.5);}
  .btn:focus-visible{outline:3px solid var(--cream);outline-offset:3px;}
  .btn.ghost{background:none;color:var(--gold);box-shadow:none;border:1px solid rgba(231,197,106,.5);
    margin-top:12px;min-width:160px;padding:11px 24px;font-size:12px;}
  .btn.ghost:active{transform:translateY(2px);}
  .hint{margin-top:14px;font-size:11px;letter-spacing:.16em;color:#c79aa0;}

  .lobby{padding-top:14px;}
  .lobby h2{font-size:clamp(22px,7vw,30px);margin-bottom:1px;}
  .lobby-sub{font-size:10px;letter-spacing:.26em;color:#c79aa0;margin-bottom:14px;}
  .menu{display:flex;flex-direction:column;gap:9px;width:100%;max-width:332px;}
  .card{display:flex;align-items:center;gap:13px;cursor:pointer;text-align:left;
    background:linear-gradient(135deg,rgba(110,15,28,.5),rgba(61,8,16,.55));
    border:1px solid rgba(231,197,106,.26);border-radius:16px;padding:11px 13px;
    transition:transform .1s ease,border-color .15s ease,background .15s ease;}
  .card:active{transform:scale(.98);border-color:rgba(231,197,106,.6);background:linear-gradient(135deg,rgba(110,15,28,.72),rgba(61,8,16,.72));}
  .chip{width:46px;height:46px;flex:none;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:25px;
    background:radial-gradient(circle at 30% 25%,rgba(231,197,106,.2),rgba(20,4,8,.55));border:1px solid rgba(231,197,106,.34);}
  .card .info{flex:1;min-width:0;}
  .card .info .nm{font-family:"Limelight","Cinzel",serif;font-size:16px;color:var(--cream);line-height:1.1;}
  .card .info .tg{font-size:10.5px;color:#d3b3b9;margin-top:3px;line-height:1.25;}
  .card .rt{display:flex;align-items:center;gap:9px;flex:none;}
  .card .rt .bb{font-size:9px;letter-spacing:.06em;color:#2a070d;background:var(--gold);border-radius:9px;padding:2px 7px;font-family:"Cinzel",serif;font-weight:700;}
  .card .rt .ch{color:var(--gold);font-size:18px;opacity:.65;}
  .card .go{color:var(--gold);font-size:18px;}

  .ticket{position:relative;z-index:3;background:linear-gradient(180deg,#4a0a14,#2a070d);
    border-top:3px solid var(--gold-deep);padding:8px 16px calc(8px + var(--safe-bottom));
    text-align:center;font-size:10px;letter-spacing:.26em;color:var(--gold);
    display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .ticket .side{flex:1;text-align:left;}.ticket .side.r{text-align:right;}
  .mute{cursor:pointer;background:none;border:1px solid rgba(231,197,106,.4);color:var(--gold);
    border-radius:20px;font-size:10px;letter-spacing:.12em;padding:6px 12px;font-family:"Cinzel",serif;}
  .mute:focus-visible{outline:2px solid var(--cream);outline-offset:2px;}
  #overScreen{overflow-y:auto;}
  .scene{display:none;align-items:center;justify-content:center;gap:12px;margin:10px 0 4px;position:relative;width:100%;max-width:320px;}
  .scene.show{display:flex;}
  .scene.distance{justify-content:space-between;}
  .scene .av{width:84px;height:84px;flex:none;}
  .scene .av img{width:100%;height:100%;border:3px solid var(--gold);object-fit:cover;box-shadow:0 0 18px rgba(231,197,106,.5);display:block;}
  .scene .av.alan img{border-radius:50%;}
  .scene .av.chloe img{border-radius:20px;}
  .scene .mid{flex:1;min-width:30px;text-align:center;font-size:22px;position:relative;height:84px;display:flex;align-items:center;justify-content:center;}
  .scene.distance .mid:before{content:"";position:absolute;left:6px;right:6px;top:50%;border-top:2px dashed rgba(231,197,106,.45);}
  .scene .mid span{position:relative;z-index:1;}
  .confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:8;}
  .confetti i{position:absolute;top:-14px;width:8px;height:13px;border-radius:2px;opacity:.95;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(115vh) rotate(720deg);}}
  .toast{position:absolute;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);z-index:9;
    background:rgba(20,4,8,.92);border:1px solid var(--gold);color:var(--cream);font-family:"Cinzel",serif;
    font-size:13px;letter-spacing:.08em;padding:9px 16px;border-radius:30px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .portrait{cursor:pointer;}
  .bowrow{display:flex;flex-direction:column;align-items:center;gap:7px;margin:14px 0 4px;}
  .bowlbl{font-size:10px;letter-spacing:.3em;color:var(--gold);}
  .bowpick{display:flex;gap:9px;}
  .sw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;position:relative;transition:transform .1s ease;}
  .sw:active{transform:scale(.9);}
  .sw.on{border-color:var(--cream);transform:scale(1.12);}
  .sw.none{background:rgba(255,255,255,.08);}
  .sw.none:after{content:"";position:absolute;left:5px;right:5px;top:12px;height:2px;background:#c79aa0;transform:rotate(-45deg);}
  .records{display:flex;flex-direction:column;gap:9px;width:100%;max-width:330px;margin-bottom:6px;}
  .rec{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:linear-gradient(180deg,rgba(110,15,28,.5),rgba(61,8,16,.55));border:1px solid rgba(231,197,106,.3);border-radius:12px;padding:11px 15px;}
  .rec .rn{display:flex;align-items:center;gap:10px;font-family:"Limelight",serif;font-size:15px;color:var(--cream);}
  .rec .rn .ic{font-size:20px;}
  .rec .rv{font-family:"Limelight",serif;font-size:20px;color:var(--gold);}
  .card .meta .bst{font-size:9px;letter-spacing:.18em;color:var(--gold);margin-top:3px;}
  @media (prefers-reduced-motion:reduce){.bulb{animation:none;opacity:.85;}}
</style>
</head>
<body>
  <main class="theatre">
    <header class="marquee">
      <div class="bulbs top"></div>
      <div class="eyebrow">NOW SHOWING</div>
      <h1 class="title">ALAN'S PICTURE PALACE</h1>
      <div class="presents">STARRING ALAN &middot; PRESENTED FOR CHLOE</div>
      <div class="presents director">DIRECTED BY SEBBY G</div>
      <div class="bulbs bottom"></div>
    </header>

    <section class="stage">
      <div class="curtain left"></div>
      <div class="curtain right"></div>
      <canvas id="game"></canvas>
      <button class="exit" id="exitBtn" aria-label="Back to lobby">↩</button>
      <div class="toast" id="toast"></div>

      <div class="hud" id="hud" style="display:none;">
        <div>
          <span class="label" id="hudLLabel">LIVES</span>
          <div class="lives" id="lives"></div>
          <span class="big" id="hudLBig" style="display:none;"></span>
        </div>
        <div class="right"><span class="label" id="hudRLabel">SCORE</span><span class="big" id="score">0</span></div>
      </div>

      <!-- Lobby -->
      <div class="screen lobby" id="lobby">
        <div class="portrait" id="portrait" role="img" aria-label="Alan the tuxedo cat"></div>
        <h2>The Lobby</h2>
        <div class="lobby-sub">PICK YOUR SHOW</div>
        <div class="menu" id="grid"></div>
        <div class="bowrow"><span class="bowlbl">ALAN'S BOW</span><div class="bowpick" id="bowpick"></div></div>
        <button class="btn ghost" id="recordsBtn">🏆 BOX OFFICE RECORDS</button>
      </div>

      <!-- Records -->
      <div class="screen hidden" id="recordsScreen">
        <h2>Box Office</h2>
        <div class="lobby-sub">CHLOE'S BEST SCORES</div>
        <div class="records" id="recordsList"></div>
        <button class="btn ghost" id="recordsBackBtn">← BACK TO LOBBY</button>
      </div>

      <!-- Pre-game -->
      <div class="screen hidden" id="preScreen">
        <div class="star" id="preIco">🍿</div>
        <h2 id="preTitle">Game</h2>
        <p id="preText"></p>
        <button class="btn" id="playBtn">PLAY</button>
        <button class="btn ghost" id="backBtn">← BACK TO LOBBY</button>
      </div>

      <!-- Game over / win -->
      <div class="screen hidden" id="overScreen">
        <div class="confetti" id="confetti"></div>
        <h2 id="overTitle">THE END</h2>
        <div class="scene" id="overScene">
          <div class="av alan"><img id="alanAv" alt="Alan"></div>
          <div class="mid" id="sceneMid"></div>
          <div class="av chloe"><img id="chloeImg" src="" alt="Chloe"></div>
        </div>
        <div class="big-score" id="finalScore">0</div>
        <p id="overMsg"><span class="name">Chloe</span> — beat that if you can.</p>
        <div class="hint" id="bestLine"></div>
        <button class="btn" id="againBtn">ENCORE</button>
        <button class="btn ghost" id="overBackBtn">← BACK TO LOBBY</button>
      </div>
    </section>

    <footer class="ticket">
      <span class="side">ADMIT ONE</span>
      <button class="mute" id="muteBtn" aria-pressed="false">SOUND: ON</button>
      <span class="side r">ROW A · SEAT 1</span>
    </footer>
  </main>

        if(cd.state==='down'){rrect(cd.x,cd.y,cd.w,cd.h,10);ctx.fillStyle='#6e0f1c';ctx.fill();
          ctx.strokeStyle='rgba(231,197,106,.5)';ctx.lineWidth=2;rrect(cd.x+3,cd.y+3,cd.w-6,cd.h-6,8);ctx.stroke();
          ctx.fillStyle='#e7c56a';ctx.font='bold '+Math.min(cd.w,cd.h)*0.42+'px Limelight,Cinzel,serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('A',cd.x+cd.w/2,cd.y+cd.h/2);}
        else{rrect(cd.x,cd.y,cd.w,cd.h,10);ctx.fillStyle=cd.state==='done'?'#234a23':'#f6ecd2';ctx.fill();
          ctx.strokeStyle='rgba(231,197,106,.7)';ctx.lineWidth=2;rrect(cd.x,cd.y,cd.w,cd.h,10);ctx.stroke();
          symFns[cd.sym](cd.x+cd.w/2,cd.y+cd.h/2,Math.min(cd.w,cd.h));}}}};
  }

  function makeHorror(){
    const cx=W/2,cy=H/2+10;let ghosts=[],bursts=[],spawnTimer=0,elapsed=0,score=0,lives=3,flash=0;
    hudLives(3);hudRight('SCORE',0);
    function spawn(){const edge=Math.floor(Math.random()*4);let x,y;
      if(edge===0){x=Math.random()*W;y=-20;}else if(edge===1){x=W+20;y=Math.random()*H;}
      else if(edge===2){x=Math.random()*W;y=H+20;}else{x=-20;y=Math.random()*H;}
      const bat=Math.random()<0.28;ghosts.push({x,y,bat,r:bat?13:18,sp:(bat?0.052:0.032)+elapsed/650000,phase:Math.random()*6});}
    function burst(x,y){for(let i=0;i<10;i++)bursts.push({x,y,vx:(Math.random()-0.5)*3.4,vy:(Math.random()-0.5)*3.4,life:1});}
    return{onResize(){},
      down(x,y){for(let i=ghosts.length-1;i>=0;i--){const g=ghosts[i];if(Math.hypot(x-g.x,y-g.y)<g.r+12){
        ghosts.splice(i,1);score+=g.bat?2:1;setScore(score);burst(g.x,g.y);blip(g.bat?300:540,.12,'square');return;}}},
      update(dt){elapsed+=dt;spawnTimer+=dt;flash=Math.max(0,flash-dt/300);
        const gap=Math.max(520,1150-elapsed/38);if(spawnTimer>gap){spawnTimer=0;spawn();}
        for(let i=ghosts.length-1;i>=0;i--){const g=ghosts[i];const dx=cx-g.x,dy=cy-g.y,d=Math.hypot(dx,dy)||1;
          g.x+=dx/d*g.sp*dt;g.y+=dy/d*g.sp*dt;g.phase+=dt*0.005;
          if(d<46){ghosts.splice(i,1);lives--;hudLives(lives);flash=1;blip(120,.3,'sawtooth');
            if(lives<=0){finish(score,{title:'EEK!',msg:'The ghosts spooked Alan! She banished '+score+' first. <span class="name">Chloe</span> loves a good scare — beat it?'});return;}}}
        for(let i=bursts.length-1;i>=0;i--){const b=bursts[i];b.x+=b.vx;b.y+=b.vy;b.life-=dt/400;if(b.life<=0)bursts.splice(i,1);}},
      render(){
        ctx.fillStyle='#0a0612';ctx.fillRect(0,0,W,H);
        const rg=ctx.createRadialGradient(cx,cy,30,cx,cy,Math.max(W,H)*0.7);rg.addColorStop(0,'rgba(95,45,130,.28)');rg.addColorStop(1,'rgba(0,0,0,.88)');ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
        ctx.fillStyle='rgba(231,197,106,.45)';ctx.beginPath();ctx.arc(W-38,46,15,0,7);ctx.fill();
        for(const g of ghosts){
          if(g.bat){ctx.save();ctx.translate(g.x,g.y);ctx.fillStyle='#2a1336';const w=Math.sin(g.phase*3)*4;
            ctx.beginPath();ctx.arc(0,0,7,0,7);ctx.fill();
            ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(-15,-9-w,-21,3);ctx.quadraticCurveTo(-12,3,0,5);ctx.closePath();ctx.fill();
            ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(15,-9-w,21,3);ctx.quadraticCurveTo(12,3,0,5);ctx.closePath();ctx.fill();
            ctx.fillStyle='#e7c56a';ctx.beginPath();ctx.arc(-2.5,-1,1.4,0,7);ctx.arc(2.5,-1,1.4,0,7);ctx.fill();ctx.restore();}
          else{const yo=Math.sin(g.phase*2)*3;ctx.save();ctx.translate(g.x,g.y+yo);ctx.fillStyle='rgba(246,246,255,.93)';
            ctx.beginPath();ctx.moveTo(-g.r,g.r);ctx.lineTo(-g.r,0);ctx.arc(0,0,g.r,Math.PI,0,false);ctx.lineTo(g.r,g.r);
            ctx.quadraticCurveTo(g.r*0.66,g.r-6,g.r*0.33,g.r);ctx.quadraticCurveTo(0,g.r-6,-g.r*0.33,g.r);ctx.quadraticCurveTo(-g.r*0.66,g.r-6,-g.r,g.r);ctx.closePath();ctx.fill();
            ctx.fillStyle='#2a1336';ctx.beginPath();ctx.arc(-5,-4,2.6,0,7);ctx.arc(5,-4,2.6,0,7);ctx.fill();
            ctx.beginPath();ctx.ellipse(0,3,3,4,0,0,7);ctx.fill();ctx.restore();}}
        for(const b of bursts){ctx.globalAlpha=Math.max(0,b.life);ctx.fillStyle='#d8c6ef';ctx.beginPath();ctx.arc(b.x,b.y,3,0,7);ctx.fill();ctx.globalAlpha=1;}
        alanHead(cx,cy,1.05);
        if(flash>0){ctx.fillStyle='rgba(210,32,44,'+(flash*0.4)+')';ctx.fillRect(0,0,W,H);}}};
  }

  function makeRap(){
    const laneX=i=>W*(i+0.5)/3, hitY=H-120, spawnY=-30;
    const BPM=124, beatMs=60000/BPM, travelMs=beatMs*2, fallSpeed=(hitY-spawnY)/travelMs;
    let notes=[],beatTimer=0,beatCount=0,score=0,combo=0,maxCombo=0,hype=55,bob=0,flash=[0,0,0];
    const VERSE=64,LANEPITCH=[0.8,1.0,1.26];
    hudBig('COMBO','0');hudRight('SCORE',0);
    function spawnBeat(bc){if(Math.random()<0.82)notes.push({lane:Math.floor(Math.random()*3),y:spawnY,hit:false,missed:false});
      if(bc%4===0&&Math.random()<0.3)notes.push({lane:Math.floor(Math.random()*3),y:spawnY,hit:false,missed:false});}
    return{onResize(){},
      down(x){const lane=Math.max(0,Math.min(2,Math.floor(x/(W/3))));let best=-1,bd=1e9;
        for(let i=0;i<notes.length;i++){const n=notes[i];if(n.hit||n.lane!==lane)continue;const d=Math.abs(n.y-hitY);if(d<bd){bd=d;best=i;}}
        if(best>=0&&bd<48){const n=notes[best];n.hit=true;const perfect=bd<16;const pts=perfect?100:(bd<30?60:30);
          const mult=1+Math.min(2,Math.floor(combo/8)*0.25);score+=Math.round(pts*mult);combo++;maxCombo=Math.max(maxCombo,combo);
          hype=Math.min(100,hype+(perfect?4:2));flash[lane]=1;setScore(score);hudBig('COMBO',combo+'x');meow(LANEPITCH[lane],perfect?0.18:0.14);}
        else{flash[lane]=0.4;}},
      update(dt){beatTimer+=dt;bob+=dt;for(let i=0;i<3;i++)flash[i]=Math.max(0,flash[i]-dt/180);
        while(beatTimer>=beatMs){beatTimer-=beatMs;if(beatCount%2===0)kick();else snare();hat();
          if(beatCount<VERSE)spawnBeat(beatCount);beatCount++;
          if(beatCount>=VERSE+4){finish(score,{win:true,title:'MIC DROP!',msg:'MC Alan owned the battle with a '+maxCombo+'x combo! <span class="name">Chloe</span> is on her feet. 🎤',scene:{chloe:'happy',alan:true,mood:'celebrate'}});return;}}
        for(let i=notes.length-1;i>=0;i--){const n=notes[i];n.y+=fallSpeed*dt;
          if(!n.hit&&n.y>hitY+48){n.hit=true;n.missed=true;combo=0;hudBig('COMBO','0');hype=Math.max(0,hype-7);blip(150,.12,'sawtooth');
            if(hype<=0){finish(score,{title:'BOOED OFF!',msg:'The crowd lost the vibe — MC Alan scored '+score+'. <span class="name">Chloe</span> knows you\u2019ve got bars, run it back!',scene:{chloe:'sad',alan:true,mood:'distance'}});return;}}
          if(n.y>H+40)notes.splice(i,1);}},
      render(){
        ctx.fillStyle='#0c0c0e';ctx.fillRect(0,0,W,H);
        const sp=ctx.createRadialGradient(W/2,hitY,20,W/2,hitY,H*0.75);sp.addColorStop(0,'rgba(231,197,106,.13)');sp.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=sp;ctx.fillRect(0,0,W,H);
        for(let i=1;i<3;i++){ctx.strokeStyle='rgba(231,197,106,.08)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(W*i/3,0);ctx.lineTo(W*i/3,H);ctx.stroke();}
        for(let i=0;i<3;i++){const lx=laneX(i);ctx.fillStyle=flash[i]>0?'rgba(231,197,106,'+(0.22+flash[i]*0.5)+')':'rgba(231,197,106,.10)';rrect(lx-W/6+6,hitY-5,W/3-12,10,5);ctx.fill();}
        ctx.strokeStyle='rgba(231,197,106,.4)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,hitY);ctx.lineTo(W,hitY);ctx.stroke();
        for(const n of notes){if(n.hit&&!n.missed)continue;const lx=laneX(n.lane);ctx.save();ctx.translate(lx,n.y);
          ctx.fillStyle=n.missed?'rgba(120,120,130,.45)':'#e7c56a';ctx.beginPath();ctx.arc(0,0,15,0,7);ctx.fill();
          ctx.fillStyle='#3d0810';ctx.beginPath();ctx.arc(0,0,6,0,7);ctx.fill();
          ctx.fillStyle=n.missed?'#888':'#e7c56a';ctx.beginPath();ctx.arc(0,0,2,0,7);ctx.fill();ctx.restore();}
        const mx=40,mw=W-80,my=18;ctx.fillStyle='rgba(255,255,255,.12)';rrect(mx,my,mw,7,4);ctx.fill();
        ctx.fillStyle=hype>30?'#9fcf63':'#d2202c';rrect(mx,my,mw*hype/100,7,4);ctx.fill();
        ctx.fillStyle='#e7c56a';ctx.font='9px Cinzel,serif';ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText('CROWD HYPE',W/2,my-4);
        const by=H-58+Math.sin(bob*0.012)*3;
        ctx.strokeStyle='#9a9a9a';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(W/2+26,by+4);ctx.lineTo(W/2+33,by+26);ctx.stroke();
        ctx.fillStyle='#cfcfcf';ctx.beginPath();ctx.arc(W/2+26,by,6,0,7);ctx.fill();
        alanHead(W/2,by,0.9);}};
  }

  const REG=[
    {id:'catch',ico:'🍿',num:'FEATURE No. 1',name:'Popcorn Premiere',tag:'Drag to catch the popcorn',
     text:'Slide your fingertip to move Alan\u2019s popcorn bucket. Catch every kernel, grab golden tickets for +5, and don\u2019t drop three.',make:makeCatch},
    {id:'aus',ico:'🎈',num:'FEATURE No. 2',name:'Alan to Australia',tag:'Float across the world to Chloe',
     text:'Alan is flying from the UK to visit Chloe in Australia by hot-air balloon! Tap to rise, ease off to sink, and thread the gaps between the clouds. Clear 14 to land safely.',make:makeAustralia},
    {id:'rap',ico:'🎤',num:'FEATURE No. 3',name:'MC Alan',tag:'Tap to the beat, keep the crowd hyped',
     text:'Battle night! Beats drop down three lanes toward the gold line. Tap the matching lane (left, middle, or right) right as each disc lands. Stack combos to score and keep the crowd hyped — ride the whole verse to the mic drop. Original beat, no biting.',make:makeRap},
    {id:'horror',ico:'👻',num:'FEATURE No. 4',name:'Midnight Viewing',tag:'A spooky late-night screening',
     text:'The lights go down and the cinema turns haunted! Ghosts and bats drift toward Alan from every side — tap them to banish them before they reach her seat. Bats are worth +2. Don\u2019t get spooked three times. Boo!',make:makeHorror},
    {id:'match',ico:'🃏',num:'FEATURE No. 5',name:'Matinee Match',tag:'Find the matching pairs',
     text:'Tap two cards to flip them. Find all six matching pairs of cinema treasures. The fewer moves, the higher the score.',make:makeMatch},
    {id:'reflex',ico:'🎬',num:'FEATURE No. 6',name:'Reel Reflex',tag:'Tap Alan before she vanishes',
     text:'Tap Alan as she pops up in the seats. Golden Alans are +3 — but never tap the \u201cCUT!\u201d clappers. 40 seconds on the clock.',make:makeReflex},
    {id:'dash',ico:'🐾',num:'FEATURE No. 7',name:'Alan\u2019s Dash',tag:'Tap anywhere to leap',
     text:'Alan sprints down the red carpet. Tap anywhere to jump the rolling film reels. One trip ends the show.',make:makeDash},
  ];
  let cur=null,curMeta=null,last=0,running=false;
  // ---- persistence (saved in the phone's browser; falls back to memory if unavailable) ----
  function loadStore(){try{return JSON.parse(localStorage.getItem('alanPalace')||'{}')||{};}catch(e){return {};}}
  function saveStore(){try{localStorage.setItem('alanPalace',JSON.stringify({best:BEST,bow:BOW}));}catch(e){}}
  const STORE=loadStore();const BEST=STORE.best||{};let BOW=STORE.bow||null;

  function buildCards(){const c=document.getElementById('grid');c.innerHTML='';
    REG.forEach(g=>{const t=document.createElement('div');t.className='card';
      t.innerHTML='<div class="chip">'+g.ico+'</div><div class="info"><div class="nm">'+g.name+'</div><div class="tg">'+g.tag+'</div></div><div class="rt"><span class="bb" id="bst-'+g.id+'" style="display:none"></span><span class="ch">›</span></div>';
      t.addEventListener('click',()=>openPre(g));c.appendChild(t);});updateCardBests();}
  function updateCardBests(){REG.forEach(g=>{const el=document.getElementById('bst-'+g.id);if(el){if(BEST[g.id]){el.textContent=BEST[g.id];el.style.display='inline-block';}else{el.style.display='none';}}});}
  const BOWS=[null,'#d2202c','#e88ab0','#e7c56a','#5aa9e7','#9a6cd0','#6fcf97'];
  function buildBowPicker(){const p=document.getElementById('bowpick');p.innerHTML='';
    BOWS.forEach(col=>{const s=document.createElement('div');s.className='sw'+(col?'':' none')+((BOW===col)?' on':'');
      if(col)s.style.background=col;s.title=col?'Bow':'No bow';
      s.addEventListener('click',()=>{BOW=col;saveStore();buildBowPicker();ensureAudio();if(audio&&audio.state==='suspended')audio.resume();blip(col?720:300,.1,'triangle');});
      p.appendChild(s);});}
  function openRecords(){const list=document.getElementById('recordsList');list.innerHTML='';
    REG.forEach(g=>{const d=document.createElement('div');d.className='rec';
      d.innerHTML='<div class="rn"><span class="ic">'+g.ico+'</span>'+g.name+'</div><div class="rv">'+(BEST[g.id]||'—')+'</div>';list.appendChild(d);});
    lobby.classList.add('hidden');document.getElementById('recordsScreen').classList.remove('hidden');}
  function openPre(g){curMeta=g;document.getElementById('preIco').textContent=g.ico;document.getElementById('preTitle').textContent=g.name;document.getElementById('preText').textContent=g.text;
    lobby.classList.add('hidden');overScreen.classList.add('hidden');preScreen.classList.remove('hidden');hud.style.display='none';exitBtn.style.display='none';}
  function startCurrent(){ensureAudio();if(audio&&audio.state==='suspended')audio.resume();clearConfetti();
    preScreen.classList.add('hidden');overScreen.classList.add('hidden');hud.style.display='flex';exitBtn.style.display='block';
    cur=curMeta.make();running=true;last=0;}
  function launchConfetti(){confettiEl.innerHTML='';const cols=['#e7c56a','#d2202c','#f6ecd2','#9fcf63','#6aa9e7','#e08aa0'];
    for(let i=0;i<20;i++){const s=document.createElement('i');s.style.left=Math.random()*100+'%';s.style.background=cols[i%cols.length];
      s.style.animationDuration=(1.6+Math.random()*1.5)+'s';s.style.animationDelay=(Math.random()*0.6)+'s';confettiEl.appendChild(s);}}
  function clearConfetti(){confettiEl.innerHTML='';}
  let toastT=null;
  function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>toast.classList.remove('show'),2200);}

  function finish(score,opts){opts=opts||{};running=false;cur=null;exitBtn.style.display='none';
    overTitle.textContent=opts.title||'THE END';finalScoreEl.textContent=score;
    overMsg.innerHTML=opts.msg||'<span class="name">Chloe</span> — beat that if you can.';
    const sc=opts.scene;
    if(sc){overScene.className='scene show'+(sc.mood==='distance'?' distance':'');
      chloeImg.src=sc.chloe==='sad'?CHLOE_SAD:CHLOE_HAPPY;
      alanAv.parentElement.style.display=sc.alan===false?'none':'block';
      sceneMid.innerHTML='<span>'+(sc.mood==='distance'?'🎈':'✨🎉✨')+'</span>';
      if(sc.mood==='distance')clearConfetti();else launchConfetti();
    }else{overScene.className='scene';clearConfetti();}
    const key=curMeta.id;const prev=BEST[key]||0;const rec=score>prev;BEST[key]=Math.max(prev,score);saveStore();updateCardBests();
    bestLine.textContent=(rec&&score>0?'★ NEW RECORD! ':'')+'YOUR BEST: '+BEST[key];
    hud.style.display='none';overScreen.classList.remove('hidden');blip(opts.win?523:330,.3,'sine');if(opts.win)blip(784,.3,'sine');}
  function toLobby(){running=false;cur=null;hud.style.display='none';exitBtn.style.display='none';clearConfetti();
    preScreen.classList.add('hidden');overScreen.classList.add('hidden');lobby.classList.remove('hidden');}

  document.getElementById('playBtn').addEventListener('click',startCurrent);
  document.getElementById('backBtn').addEventListener('click',toLobby);
  document.getElementById('againBtn').addEventListener('click',startCurrent);
  document.getElementById('overBackBtn').addEventListener('click',toLobby);
  exitBtn.addEventListener('click',toLobby);
  document.getElementById('recordsBtn').addEventListener('click',()=>{ensureAudio();if(audio&&audio.state==='suspended')audio.resume();openRecords();});
  document.getElementById('recordsBackBtn').addEventListener('click',()=>{document.getElementById('recordsScreen').classList.add('hidden');lobby.classList.remove('hidden');});
  const purrs=['Alan says: miaow! 🐾','Alan misses you, Chloe ❤','Alan saved you the best seat 🎬','Purrr… enjoy the show, Chloe','Alan: feed me popcorn 🍿'];let purrIdx=0;
  portrait.addEventListener('click',()=>{ensureAudio();if(audio&&audio.state==='suspended')audio.resume();
    meow();showToast(purrs[purrIdx++%purrs.length]);});

  function unlockAudio(){ensureAudio();if(!audio)return;if(audio.state==='suspended')audio.resume();
    try{const b=audio.createBuffer(1,1,22050);const s=audio.createBufferSource();s.buffer=b;s.connect(audio.destination);s.start(0);}catch(e){}}
  document.addEventListener('pointerdown',unlockAudio,true);

  function rel(e){const r=canvas.getBoundingClientRect();const t=e.touches&&e.touches[0]?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
  canvas.addEventListener('pointerdown',e=>{if(!cur)return;const p=rel(e);cur.down&&cur.down(p.x,p.y);e.preventDefault();},{passive:false});
  canvas.addEventListener('pointermove',e=>{if(!cur)return;const p=rel(e);cur.move&&cur.move(p.x,p.y);e.preventDefault();},{passive:false});

  function frame(t){if(!last)last=t;const dt=Math.min(50,t-last);last=t;if(running&&cur)cur.update(dt);
    ctx.clearRect(0,0,W,H);if(cur&&cur.render)cur.render();requestAnimationFrame(frame);}

  window.addEventListener('resize',resize);buildCards();buildBowPicker();
  requestAnimationFrame(()=>{resize();requestAnimationFrame(frame);});
})();
</script>
